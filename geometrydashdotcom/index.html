<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Geometry Dash</title>
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <style>
    :root {
      --bg-color: #0a0a0a;
      --card-bg: #1a1a1a;
      --accent-color: #007bff;
      --text-color: #ffffff;
      --demon-red: #ff4d4d;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg-color);
      color: var(--text-color);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    nav {
      width: 100%;
      background: #111;
      display: flex;
      justify-content: center;
      padding: 15px 0;
      border-bottom: 2px solid #333;
      margin-bottom: 40px;
    }

    .tab-btn {
      background: none;
      border: none;
      color: #888;
      font-size: 18px;
      font-weight: bold;
      padding: 10px 30px;
      cursor: pointer;
      transition: 0.3s;
    }

    .tab-btn.active {
      color: var(--text-color);
      border-bottom: 2px solid var(--accent-color);
    }

    .tab-content {
      display: none;
      width: 90%;
      max-width: 800px;
      flex-direction: column;
      gap: 15px;
      align-items: center;
    }

    .tab-content.active {
      display: flex;
      padding-bottom: 20px;
    }

    button.level-btn {
      width: 100%;
      padding: 20px;
      font-size: 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: var(--card-bg);
      color: white;
      transition: 0.2s;
      border-left: 5px solid var(--accent-color);
    }

    button.level-btn:hover {
      background: #252525;
      transform: translateX(10px);
    }

    .demon-item {
      width: 100%;
      background: var(--card-bg);
      padding: 15px 25px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-left: 5px solid var(--demon-red);
      cursor: pointer;
      transition: 0.2s;
      box-sizing: border-box;
    }

    .demon-item:hover {
      background: #221010;
      transform: scale(1.02);
    }

    .demon-rank {
      font-size: 24px;
      font-weight: 900;
      color: var(--demon-red);
      margin-right: 20px;
      min-width: 40px;
    }

    .demon-info {
      flex-grow: 1;
    }

    .demon-name {
      font-size: 20px;
      font-weight: bold;
      display: block;
    }

    .demon-creator {
      font-size: 14px;
      color: #aaa;
    }

    .demon-record {
      font-size: 18px;
      font-weight: bold;
      color: var(--accent-color);
      margin-left: 20px;
      min-width: 60px;
      text-align: right;
    }
    .custom-input {
      background: #333 !important;
      border-left: 5px solid #00ff88 !important;
    }
  </style>
</head>

<body>

  <nav>
    <button class="tab-btn active" onclick="openTab('levels')">LEVELS</button>
    <button class="tab-btn" onclick="openTab('demonlist')">WBDL</button>
  </nav>

  <div id="levels" class="tab-content active">
    <button class="level-btn custom-input" onclick="promptLevel()">Custom Level (from GD servers)</button>
    <button class="level-btn" onclick="loadLevel('-1')">Stereo Madness</button>
    <button class="level-btn" onclick="loadLevel('-2')">Back on Track</button>
    <button class="level-btn" onclick="loadLevel('-3')">Polargeist</button>
    <button class="level-btn" onclick="loadLevel('-4')">Dry Out</button>
    <button class="level-btn" onclick="loadLevel('-5')">Base after Base</button>
    <button class="level-btn" onclick="loadLevel('-6')">Cant Let Go</button>
    <button class="level-btn" onclick="loadLevel('-7')">Jumper</button>
    <button class="level-btn" onclick="loadLevel('-8')">Time Machine</button>
    <button class="level-btn" onclick="loadLevel('-9')">Cycles</button>
    <button class="level-btn" onclick="loadLevel('-10')">xStep</button>
    <button class="level-btn" onclick="loadLevel('-11')">Clutterfunk</button>
    <button class="level-btn" onclick="loadLevel('-12')">Theory of Everything</button>
    <button class="level-btn" onclick="loadLevel('-13')">Electroman Adventures</button>
    <button class="level-btn" onclick="loadLevel('-14')">Clubstep</button>
    <button class="level-btn" onclick="loadLevel('-15')">Electrodynamix</button>
    <button class="level-btn" onclick="loadLevel('-16')">Hexagon Force</button>
    <button class="level-btn" onclick="loadLevel('-17')">Blast Processing</button>
    <button class="level-btn" onclick="loadLevel('-18')">Theory of Everything 2</button>
    <button class="level-btn" onclick="loadLevel('-19')">Geometrical Dominator</button>
    <button class="level-btn" onclick="loadLevel('-20')">Deadlocked</button>
    <button class="level-btn" onclick="loadLevel('-21')">Fingerdash</button>
    <button class="level-btn" onclick="loadLevel('-22')">Dash</button>
    <button class="level-btn" onclick="loadLevel('-23')">Every End</button>
  </div>

  <div id="demonlist" class="tab-content">
     <h3>Web Browser Demonlist</h3>
     <p>Visit the <a href="https://webdemonlist.org" target="_blank">WBDL website</a> to see the rankings :O</p>
   </div>

  <script>
    function openTab(tabName) {
      const contents = document.getElementsByClassName("tab-content");
      for (let content of contents) {
        content.classList.remove("active");
      }

      const tabs = document.getElementsByClassName("tab-btn");
      for (let tab of tabs) {
        tab.classList.remove("active");
      }

      document.getElementById(tabName).classList.add("active");
      event.currentTarget.classList.add("active");
    }

    function loadLevel(id) {
      const url = new URL('/geometrydashdotcom/game/index.html', window.location.origin);
      url.searchParams.set('id', id);
      window.location.href = url.toString();
    }

    function promptLevel() {
      const id = prompt('Enter level ID:');
      if (id === null) return;
      const num = Number(id.trim());
      if (!Number.isInteger(num)) {
        alert('Invalid Level ID...');
        return;
      }
      if (id.trim() === '') {
        alert('Please enter a Level ID');
      } else {
        loadLevel(id);
      }
    }
  </script>
</body>
</html>
